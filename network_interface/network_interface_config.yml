---
- name: Configure Network Switch Interfaces with QinQ
  hosts: alphabridge_devices
  gather_facts: no
  vars:
    ansible_python_interpreter: /opt/librenms/librenms-ansible-inventory-plugin/bin/python3

  tasks:
    - name: Parse config_json from string or dict
      ansible.builtin.set_fact:
        final_config_json: "{{ config_json | from_json if config_json is string else config_json }}"

    - name: Validate config has interfaces
      ansible.builtin.assert:
        that:
          - final_config_json.interfaces is defined
          - final_config_json.interfaces | length > 0

    - name: Generate network configuration Python script
      ansible.builtin.copy:
        dest: "/opt/librenms/librenms-ansible-inventory-plugin/tmp/network_config_exec.py"
        mode: '0755'
        content: |
          #!/usr/bin/env python3

          import telnetlib
          import time
          import json
          import sys

          HOST = "{{ ansible_host }}"
          USER = "{{ ansible_user }}"
          PASSWORD = "{{ ansible_password }}"

          import json
          CONFIG_JSON = json.loads("""{{ final_config_json | to_json }}""")

          def send_cmd(tn, cmd, delay=1):
              print(f"[DEBUG] Sending: {cmd}")
              tn.write(cmd.encode('ascii') + b"\n")
              time.sleep(delay)
              return tn.read_very_eager().decode('ascii')

          def read_until(tn, pattern, delay=1):
              time.sleep(delay)
              return tn.read_until(pattern.encode('ascii'), timeout=10).decode('ascii')

          def build_interface_config(interface):
              commands = []
              name = interface.get('name', '')
              description = interface.get('description', '')
              spanning_tree = interface.get('spanning_tree', True)
              mode = interface.get('mode', 'access')
              allowed_vlans = interface.get('allowed_vlans', '')
              pvid = interface.get('pvid')
              qinq_rules = interface.get('qinq_rules', [])
              lacp = interface.get('lacp', False)

              commands.append(f"interface {name}")

              if description:
                  commands.append(f"description {description}")

              if not spanning_tree:
                  commands.append("no spanning-tree")

              if mode == 'trunk':
                  commands.append("switchport mode trunk")
                  if allowed_vlans:
                      commands.append(f"switchport trunk vlan-allowed {allowed_vlans}")
                  if pvid:
                      commands.append(f"switchport pvid {pvid}")

              elif mode == 'dot1q-tunnel-uplink':
                  commands.append("switchport mode dot1q-tunnel-uplink")
                  if allowed_vlans:
                      commands.append(f"switchport trunk vlan-allowed {allowed_vlans}")

              elif mode == 'dot1q-translating-tunnel':
                  commands.append("switchport mode dot1q-translating-tunnel")
                  if allowed_vlans:
                      commands.append(f"switchport trunk vlan-allowed {allowed_vlans}")
                  if pvid:
                      commands.append(f"switchport pvid {pvid}")
                  for rule in qinq_rules:
                      from_vlan = rule.get('from')
                      to_vlan = rule.get('to', 1)
                      cos = rule.get('cos', 0)
                      commands.append(f"switchport dot1q-translating-tunnel mode QinQ translate {from_vlan} {to_vlan} {cos}")

              if lacp:
                  commands.append("channel-group 1 mode active")

              commands.append("!")
              return commands

          def configure_device():
              try:
                  print(f"[INFO] Connecting to {HOST}...")
                  tn = telnetlib.Telnet(HOST, timeout=15)

                  output = read_until(tn, "Username:", 2)
                  print(f"[DEBUG] {output}")
                  send_cmd(tn, USER, 1)

                  output = read_until(tn, "Password:", 1)
                  print(f"[DEBUG] {output}")
                  send_cmd(tn, PASSWORD, 1)

                  output = read_until(tn, ">", 2)
                  print(f"[DEBUG] {output}")

                  send_cmd(tn, "enable", 1)
                  output = read_until(tn, "#", 1)
                  print(f"[DEBUG] {output}")

                  send_cmd(tn, "config", 1)
                  output = read_until(tn, "_config#", 1)
                  print(f"[DEBUG] {output}")

                  interfaces = CONFIG_JSON.get('interfaces', [])
                  print(f"[INFO] Configuring {len(interfaces)} interfaces...")

                  for interface in interfaces:
                      iface_name = interface.get('name', 'unknown')
                      print(f"[INFO] Processing interface: {iface_name}")

                      commands = build_interface_config(interface)

                      for cmd in commands:
                          if cmd.startswith('interface '):
                              output = read_until(tn, "#", 1)
                              print(f"[DEBUG] {output}")
                          send_cmd(tn, cmd, 0.5)

                      print(f"[SUCCESS] Configured {iface_name}")

                  print("[INFO] Saving configuration...")
                  send_cmd(tn, "!", 1)
                  output = read_until(tn, "#", 1)
                  print(f"[DEBUG] {output}")

                  send_cmd(tn, "write all", 3)
                  output = read_until(tn, "#", 2)
                  print(f"[DEBUG] {output}")

                  tn.close()
                  print("[SUCCESS] Configuration completed successfully")
                  return True

              except Exception as e:
                  error_msg = f"[ERROR] {str(e)}"
                  print(error_msg)
                  try:
                      with open("/opt/librenms/librenms-ansible-inventory-plugin/tmp/network_config_error.log", "w") as f:
                          f.write(error_msg)
                  except:
                      pass
                  return False

          if __name__ == "__main__":
              success = configure_device()
              sys.exit(0 if success else 1)

    - name: Execute network configuration script
      ansible.builtin.command:
        cmd: /opt/librenms/librenms-ansible-inventory-plugin/bin/python3 /opt/librenms/librenms-ansible-inventory-plugin/tmp/network_config_exec.py
      register: exec_result
      changed_when: true
      failed_when: exec_result.rc != 0

    - name: Display execution output
      ansible.builtin.debug:
        msg: "{{ exec_result.stdout_lines }}"

    - name: Fetch error log if exists
      ansible.builtin.fetch:
        src: "/opt/librenms/librenms-ansible-inventory-plugin/tmp/network_config_error.log"
        dest: "./network_config_error.log"
        flat: yes
      failed_when: false